<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Training">
<title>PRO · Training-cockpit</title>
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#141414;--elev:#1a1916;--sunken:#0c0c0c;
  --fg:#f6f4ef;--fg2:#cfd0d1;--fg3:#a8a7a1;--fg4:#6e6e69;
  --rule:#3a3a37;--accent:#fd5926;--accent-deep:#c93f15;--accent-fg:#141414;--green:#3f6b3a;
  --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;--human:'Inter',-apple-system,sans-serif;
}
html,body{background:var(--bg);color:var(--fg);font-family:var(--human);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
body{padding:22px 16px 64px;max-width:720px;margin:0 auto}
.top{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--rule);padding-bottom:12px;margin-bottom:22px}
.monolith{font-family:var(--mono);font-weight:800;letter-spacing:.4em;font-size:19px}
.eyebrow{font-family:var(--mono);text-transform:uppercase;letter-spacing:.18em;font-size:10px;color:var(--fg3)}

/* section headers */
.cat{font-family:var(--mono);text-transform:uppercase;letter-spacing:.18em;font-size:11px;color:var(--accent);margin:26px 0 10px;border-bottom:.5px solid var(--rule);padding-bottom:6px;display:flex;justify-content:space-between;align-items:baseline}
.cat .sub{color:var(--fg4);letter-spacing:.08em}

/* hero metric strip */
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.metric{border:.5px solid var(--rule);background:var(--elev);padding:14px 14px 12px}
.metric .m-label{font-family:var(--mono);text-transform:uppercase;letter-spacing:.12em;font-size:10px;color:var(--fg3)}
.metric .m-val{font-family:var(--mono);font-weight:700;font-size:34px;letter-spacing:-.02em;margin:8px 0 2px;color:var(--fg)}
.metric .m-val.empty{color:var(--fg4)}
.metric .m-val .u{font-size:13px;color:var(--fg3);font-weight:500;margin-left:3px}
.metric .m-meta{font-family:var(--mono);font-size:10px;letter-spacing:.04em;color:var(--fg4)}
.metric .m-meta b{color:var(--fg2);font-weight:500}

/* panels */
.panel{border:.5px solid var(--rule);background:var(--elev);padding:0;margin-bottom:2px}
.empty-note{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--fg4);padding:18px 16px}

/* workout card */
.wk{border:.5px solid var(--rule);background:var(--elev);padding:16px;margin-bottom:10px}
.wk-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.wk-name{font-family:var(--mono);font-weight:700;font-size:15px;letter-spacing:.01em;color:var(--fg)}
.wk-type{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.16em;color:var(--fg3);border:.5px solid var(--rule);padding:3px 7px;white-space:nowrap}
.wk-stats{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--fg3);margin-top:6px}
.wk-stats b{color:var(--fg2);font-weight:500}
.wk-desc{font-size:13px;color:var(--fg3);margin-top:8px;line-height:1.5}

/* workout profile blocks */
.profile{display:flex;align-items:flex-end;gap:2px;height:66px;margin-top:14px;background:var(--sunken);border:.5px solid var(--rule);padding:4px}
.blk{min-width:2px;background:var(--accent);align-self:flex-end}
.profile-legend{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg4);margin-top:6px;display:flex;justify-content:space-between}

/* adapt button + reason */
.adapt-wrap{margin-top:14px}
.btn{width:100%;background:var(--accent);color:var(--accent-fg);border:none;padding:13px;font-family:var(--mono);font-weight:700;text-transform:uppercase;letter-spacing:.12em;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px}
.btn:active{box-shadow:inset 0 0 0 1px #141414}
.btn:disabled{opacity:.55}
.btn-ghost{background:transparent;color:var(--fg);border:.5px solid var(--fg4)}
.btn-adapt{background:#f6f4ef;color:var(--bg);transition:background .12s}
.btn-adapt:hover{background:#cfd0d1}
.adapt-panel{display:none;margin-top:10px;border:.5px solid var(--accent-deep);background:var(--sunken);padding:14px}
.adapt-panel.open{display:block}
.adapt-panel label{display:block;font-family:var(--mono);text-transform:uppercase;letter-spacing:.12em;font-size:10px;color:var(--fg3);margin-bottom:7px}
.adapt-panel textarea{width:100%;background:transparent;color:var(--fg);border:.5px solid var(--fg4);padding:10px;font-family:var(--human);font-size:15px;resize:vertical;min-height:64px;border-radius:0}
.adapt-panel textarea:focus{outline:none;border-color:var(--accent)}
.adapt-row{display:flex;gap:8px;margin-top:10px}
.adapt-row .btn{flex:1}

/* chart */
.chart-wrap{padding:16px}
.chips{display:flex;gap:6px;margin-bottom:14px}
.chip{font-family:var(--mono);font-size:11px;letter-spacing:.08em;padding:6px 12px;border:.5px solid var(--rule);color:var(--fg3);cursor:pointer;background:transparent}
.chip.on{background:var(--accent);color:var(--accent-fg);border-color:var(--accent)}
.chart-svg{width:100%;height:170px;display:block}
.chart-foot{font-family:var(--mono);font-size:10px;letter-spacing:.04em;color:var(--fg4);margin-top:8px;display:flex;justify-content:space-between}
.chart-foot .leg{display:flex;gap:14px}
.chart-foot .leg span::before{content:'';display:inline-block;width:14px;height:2px;vertical-align:middle;margin-right:5px}
.chart-foot .leg .ctl::before{background:var(--accent)}
.chart-foot .leg .atl::before{background:var(--fg4)}

/* upcoming list */
.up{display:flex;align-items:center;gap:12px;padding:12px 14px;border:.5px solid var(--rule);border-top:none;background:var(--elev)}
.up:first-child{border-top:.5px solid var(--rule)}
.up-date{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--accent);width:62px;flex:none;text-transform:uppercase}
.up-name{flex:1;font-size:14px;color:var(--fg);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.up-type{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg4)}
.up-load{font-family:var(--mono);font-size:11px;color:var(--fg3);flex:none;text-align:right}

.sigil{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--fg4);text-align:right;margin-top:26px;text-transform:uppercase}
#toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--fg);color:var(--bg);font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:.1em;padding:11px 18px;opacity:0;transition:opacity .18s;pointer-events:none;max-width:90%;text-align:center}
</style>
</head>
<body>
<div class="top">
  <span class="monolith">PRO</span>
  <span class="eyebrow">Training · cockpit</span>
</div>

<!-- HERO METRICS -->
<div class="metrics" id="metrics">
  <div class="metric"><div class="m-label">Fitness · CTL</div><div class="m-val empty">—</div><div class="m-meta">laden…</div></div>
  <div class="metric"><div class="m-label">Vorm · TSB</div><div class="m-val empty">—</div><div class="m-meta">laden…</div></div>
  <div class="metric"><div class="m-label">Recovery</div><div class="m-val empty">—</div><div class="m-meta">laden…</div></div>
</div>

<!-- TODAY -->
<div class="cat">Vandaag <span class="sub" id="today-date"></span></div>
<div id="today"><div class="empty-note">Laden…</div></div>

<!-- CTL TREND -->
<div class="cat">CTL-verloop <span class="sub" id="ctl-now"></span></div>
<div class="panel">
  <div class="chart-wrap">
    <div class="chips" id="chips">
      <span class="chip" data-d="30">30d</span>
      <span class="chip" data-d="90">90d</span>
      <span class="chip on" data-d="180">180d</span>
      <span class="chip" data-d="360">360d</span>
    </div>
    <svg class="chart-svg" id="chart" viewBox="0 0 700 170" preserveAspectRatio="none"></svg>
    <div class="chart-foot">
      <span class="leg"><span class="ctl">CTL</span><span class="atl">ATL</span></span>
      <span id="chart-range"></span>
    </div>
  </div>
</div>

<!-- UPCOMING -->
<div class="cat">Volgende trainingen <span class="sub">vanaf morgen</span></div>
<div id="upcoming"><div class="empty-note">Laden…</div></div>

<div class="sigil" id="sigil">v2026.1 · training-cockpit · proj-2026-003</div>
<div id="toast"></div>

<script>
/* ============================================================
   CONFIG
   ============================================================ */
var API = "https://meelkgmhexnkjyluhnvn.supabase.co/functions/v1/training?data=1";
// Adapt Training -> n8n webhook. Plak hier je n8n Production-webhook-URL.
// Leeg = knop werkt nog niet (toont melding). Vul in zodra de n8n-workflow live is.
var ADAPT_WEBHOOK = "";

var STATE = { data: null, win: 180 };
var DOW = ["zo","ma","di","wo","do","vr","za"];

/* ---------- helpers ---------- */
function el(t,c,x){var e=document.createElement(t);if(c)e.className=c;if(x!=null)e.textContent=x;return e;}
function num(v,d){ if(v==null||v==="")return null; var n=Number(v); return isNaN(n)?null:(d!=null?Math.round(n*Math.pow(10,d))/Math.pow(10,d):n); }
function fmt(v,d){ var n=num(v,d); return n==null?"—":String(n); }
function dur(sec){ if(!sec)return "—"; var h=Math.floor(sec/3600), m=Math.round((sec%3600)/60); return h>0?(h+"u"+(m<10?"0":"")+m):(m+"min"); }
function dateLabel(iso){ if(!iso)return ""; var d=new Date(iso+"T12:00:00"); return DOW[d.getDay()]+" "+String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0"); }
function toast(m){ var t=document.getElementById("toast"); t.textContent=m; t.style.opacity="1"; clearTimeout(t._t); t._t=setTimeout(function(){t.style.opacity="0";},2600); }
function formState(f){ if(f==null)return ""; if(f>5)return "fris"; if(f>-10)return "neutraal"; if(f>-30)return "vermoeid"; return "diep moe"; }
function recoState(r){ if(r==null)return ""; if(r>=67)return "groen"; if(r>=34)return "geel"; return "rood"; }

/* ============================================================
   RENDER — hero metrics
   ============================================================ */
function renderMetrics(){
  var m = STATE.data.metrics || {};
  var box = document.getElementById("metrics");
  box.innerHTML = "";
  box.appendChild(metricCard("Fitness", fmt(m.ctl,0), "", m.ctl!=null,
    m.ramp_rate!=null ? ("ramp <b>"+fmt(m.ramp_rate,1)+"</b>") : (m.wellness_date?("op "+m.wellness_date.slice(5)):"geen data")));
  box.appendChild(metricCard("Vorm · TSB", (m.form!=null && m.form>0?"+":"")+fmt(m.form,0), "", m.form!=null,
    m.form!=null ? formState(m.form) : "geen data"));
  box.appendChild(metricCard("Recovery", fmt(m.recovery,0), m.recovery!=null?"%":"", m.recovery!=null,
    m.recovery!=null ? ("whoop · "+recoState(m.recovery)) : "geen data"));
}
function metricCard(label,val,unit,has,meta){
  var c=el("div","metric");
  c.appendChild(el("div","m-label",label));
  var v=el("div","m-val"+(has?"":" empty"));
  v.appendChild(document.createTextNode(val));
  if(has&&unit){var u=el("span","u",unit);v.appendChild(u);}
  c.appendChild(v);
  var mt=el("div","m-meta"); mt.innerHTML=meta; c.appendChild(mt);
  return c;
}

/* ============================================================
   RENDER — today workouts + blocks
   ============================================================ */
function flattenSteps(doc){
  // Tolerant parser voor intervals.icu workout_doc -> [{dur, inten}]
  if(!doc) return [];
  var steps = doc.steps || doc;
  if(!Array.isArray(steps)) return [];
  var out=[];
  function walk(list, reps){
    reps = reps||1;
    for(var k=0;k<reps;k++){
      list.forEach(function(s){
        if(s && Array.isArray(s.steps)) { walk(s.steps, s.reps||1); return; }
        var d = num(s.duration!=null?s.duration:(s._duration!=null?s._duration:s.dur),0);
        if(!d) return;
        var inten=null, p=s.power||s.target||null;
        if(p){
          if(p.value!=null) inten=num(p.value,0);
          else if(p.start!=null||p.end!=null) inten=num(((num(p.start,0)||0)+(num(p.end,0)||0))/2,0);
        }
        if(inten==null && s.intensity!=null) inten=num(s.intensity,0);
        out.push({dur:d, inten:inten});
      });
    }
  }
  walk(steps,1);
  return out;
}
function renderProfile(doc){
  var blocks = flattenSteps(doc);
  if(!blocks.length) return null;
  var maxI = Math.max.apply(null, blocks.map(function(b){return b.inten||0;}));
  if(!maxI) maxI=1;
  var totalDur = blocks.reduce(function(a,b){return a+b.dur;},0)||1;
  var wrap=el("div","profile");
  blocks.forEach(function(b){
    var bar=el("div","blk");
    var h = b.inten!=null ? Math.max(0.12, Math.min(1, b.inten/maxI)) : 0.18;
    bar.style.height=(h*100)+"%";
    bar.style.flexGrow=String(Math.max(0.4,(b.dur/totalDur)*100));
    bar.style.opacity = b.inten!=null ? String(0.40+0.60*(b.inten/maxI)) : "0.30";
    if(b.inten!=null) bar.title=b.inten+"% · "+dur(b.dur);
    wrap.appendChild(bar);
  });
  return wrap;
}
function renderToday(){
  var wraps=document.getElementById("today");
  wraps.innerHTML="";
  var list = STATE.data.today_workouts || [];
  document.getElementById("today-date").textContent = dateLabel(STATE.data.today);
  if(!list.length){
    wraps.appendChild(el("div","empty-note","Geen geplande training vandaag. Rustdag of vrij in te vullen."));
    return;
  }
  list.forEach(function(w, idx){
    var c=el("div","wk");
    var head=el("div","wk-head");
    head.appendChild(el("div","wk-name", w.name||"Workout"));
    if(w.type) head.appendChild(el("div","wk-type", w.type));
    c.appendChild(head);
    var st=el("div","wk-stats");
    st.innerHTML = "<b>"+ (w.planned_load!=null?fmt(w.planned_load,0):"—") +"</b> TSS · <b>"+ dur(w.planned_duration_sec) +"</b>";
    c.appendChild(st);
    var prof=renderProfile(w.workout_doc);
    if(prof){
      c.appendChild(prof);
      var lg=el("div","profile-legend");
      lg.appendChild(el("span",null,"intensiteit"));
      lg.appendChild(el("span",null,"tijd →"));
      c.appendChild(lg);
    } else if(w.description){
      c.appendChild(el("div","wk-desc", w.description.length>240?w.description.slice(0,240)+"…":w.description));
    }
    // Adapt button only on first today-workout
    if(idx===0){
      c.appendChild(buildAdapt(list));
    }
    wraps.appendChild(c);
  });
}
function buildAdapt(list){
  var wrap=el("div","adapt-wrap");
  var btn=el("button","btn btn-adapt","⚡ Adapt Training");
  var panel=el("div","adapt-panel");
  var lbl=el("label",null,"Reden voor aanpassing · optioneel");
  var ta=document.createElement("textarea");
  ta.placeholder="bv. te lang, lage recovery, weinig tijd, benen zwaar…";
  var row=el("div","adapt-row");
  var send=el("button","btn","Verstuur");
  var cancel=el("button","btn btn-ghost","Annuleer");
  row.appendChild(send); row.appendChild(cancel);
  panel.appendChild(lbl); panel.appendChild(ta); panel.appendChild(row);
  btn.onclick=function(){ panel.classList.toggle("open"); if(panel.classList.contains("open")) ta.focus(); };
  cancel.onclick=function(){ panel.classList.remove("open"); };
  send.onclick=function(){ sendAdapt(ta.value, list, send); };
  wrap.appendChild(btn); wrap.appendChild(panel);
  return wrap;
}
function sendAdapt(reason, list, btn){
  var m = STATE.data.metrics||{};
  var payload = {
    triggered_at: new Date().toISOString(),
    date: STATE.data.today,
    reason: reason||"",
    context: { ctl:m.ctl, atl:m.atl, form:m.form, recovery:m.recovery },
    workouts: list.map(function(w){return {external_id:w.external_id,name:w.name,type:w.type,planned_load:w.planned_load,planned_duration_sec:w.planned_duration_sec};})
  };
  if(!ADAPT_WEBHOOK){
    toast("Webhook-URL nog niet ingesteld (zie ADAPT_WEBHOOK)");
    return;
  }
  btn.disabled=true; btn.textContent="Bezig…";
  fetch(ADAPT_WEBHOOK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)})
    .then(function(r){ btn.disabled=false; btn.textContent="Verstuur";
      if(r.ok){ toast("Aanpassing verstuurd naar n8n"); }
      else { toast("Fout "+r.status); } })
    .catch(function(){ btn.disabled=false; btn.textContent="Verstuur"; toast("Netwerkfout"); });
}

/* ============================================================
   RENDER — CTL chart (handgetekende SVG, geen libs)
   ============================================================ */
function renderChart(){
  var svg=document.getElementById("chart");
  var W=700,H=170,padL=8,padR=8,padT=12,padB=14;
  var all = STATE.data.ctl_series || [];
  var series = all.slice(-STATE.win);
  svg.innerHTML="";
  document.getElementById("ctl-now").textContent = "";
  if(series.length<2){
    var t=document.createElementNS("http://www.w3.org/2000/svg","text");
    t.setAttribute("x",W/2); t.setAttribute("y",H/2); t.setAttribute("text-anchor","middle");
    t.setAttribute("fill","#6e6e69"); t.setAttribute("font-family","JetBrains Mono, monospace");
    t.setAttribute("font-size","12"); t.textContent="Nog geen CTL-data — n8n-sync nog niet actief";
    svg.appendChild(t);
    document.getElementById("chart-range").textContent="";
    return;
  }
  var ctls=series.map(function(d){return num(d.ctl,1);}).filter(function(v){return v!=null;});
  var atls=series.map(function(d){return num(d.atl,1);}).filter(function(v){return v!=null;});
  var lo=Math.min.apply(null,ctls.concat(atls)), hi=Math.max.apply(null,ctls.concat(atls));
  if(lo===hi){lo-=1;hi+=1;}
  var pad=(hi-lo)*0.12; lo-=pad; hi+=pad;
  var n=series.length;
  function X(i){return padL + (i/(n-1))*(W-padL-padR);}
  function Y(v){return padT + (1-(v-lo)/(hi-lo))*(H-padT-padB);}
  function path(key,color,width,op){
    var d="",started=false;
    series.forEach(function(p,i){ var v=num(p[key],1); if(v==null)return;
      d += (started?" L":"M")+X(i).toFixed(1)+" "+Y(v).toFixed(1); started=true; });
    if(!d)return;
    var e=document.createElementNS("http://www.w3.org/2000/svg","path");
    e.setAttribute("d",d); e.setAttribute("fill","none"); e.setAttribute("stroke",color);
    e.setAttribute("stroke-width",width); e.setAttribute("stroke-linejoin","round"); e.setAttribute("stroke-linecap","round");
    if(op) e.setAttribute("opacity",op);
    svg.appendChild(e);
  }
  path("atl","#6e6e69",1,"0.8");
  path("ctl","#fd5926",2);
  var lastI=n-1, lastV=num(series[lastI].ctl,1);
  if(lastV!=null){
    var dot=document.createElementNS("http://www.w3.org/2000/svg","circle");
    dot.setAttribute("cx",X(lastI)); dot.setAttribute("cy",Y(lastV)); dot.setAttribute("r","3"); dot.setAttribute("fill","#fd5926");
    svg.appendChild(dot);
    document.getElementById("ctl-now").textContent = "nu "+fmt(lastV,0);
  }
  document.getElementById("chart-range").textContent =
    series[0].date.slice(5)+" → "+series[lastI].date.slice(5)+" · "+fmt(lo,0)+"–"+fmt(hi,0);
}

/* ============================================================
   RENDER — upcoming
   ============================================================ */
function renderUpcoming(){
  var box=document.getElementById("upcoming");
  box.innerHTML="";
  var list=STATE.data.upcoming_workouts||[];
  if(!list.length){ box.appendChild(el("div","empty-note","Niets gepland vanaf morgen.")); return; }
  list.forEach(function(w){
    var r=el("div","up");
    r.appendChild(el("div","up-date", dateLabel(w.date)));
    var mid=el("div","up-name", w.name||"Workout");
    r.appendChild(mid);
    if(w.type) r.appendChild(el("div","up-type", w.type));
    var load=el("div","up-load");
    load.innerHTML = (w.planned_load!=null?fmt(w.planned_load,0)+" TSS":"") +
                     (w.planned_duration_sec?" · "+dur(w.planned_duration_sec):"");
    r.appendChild(load);
    box.appendChild(r);
  });
}

/* ============================================================
   BOOT
   ============================================================ */
function renderAll(){ renderMetrics(); renderToday(); renderChart(); renderUpcoming();
  var s=document.getElementById("sigil");
  var g=STATE.data.generated_at ? new Date(STATE.data.generated_at) : null;
  s.textContent = "v2026.1 · training-cockpit · proj-2026-003" + (g?(" · sync "+g.toLocaleTimeString("nl-BE",{hour:"2-digit",minute:"2-digit"})):"");
}
document.getElementById("chips").addEventListener("click",function(e){
  var c=e.target.closest(".chip"); if(!c)return;
  STATE.win=Number(c.getAttribute("data-d"));
  [].forEach.call(this.querySelectorAll(".chip"),function(x){x.classList.toggle("on",x===c);});
  if(STATE.data) renderChart();
});
function load(){
  fetch(API).then(function(r){return r.json();}).then(function(d){
    STATE.data=d||{}; renderAll();
  }).catch(function(){
    document.getElementById("today").innerHTML='<div class="empty-note">Fout bij laden van de data-API.</div>';
    toast("Kan data-API niet bereiken");
  });
}
load();
